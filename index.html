<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stavební deník – Přihlášení</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:    #1e40af;
      --blue-d:  #1e3a8a;
      --blue-l:  #dbeafe;
      --orange:  #ea580c;
      --gray-50: #f8fafc;
      --gray-100:#f1f5f9;
      --gray-200:#e2e8f0;
      --gray-400:#94a3b8;
      --gray-600:#475569;
      --gray-800:#1e293b;
    }
    body { font-family: system-ui, sans-serif; background: var(--gray-100); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .logo-bar { text-align: center; margin-bottom: 32px; }
    .logo-bar .icon { font-size: 2.8rem; display: block; margin-bottom: 8px; }
    .logo-bar h1 { font-size: 1.6rem; font-weight: 800; color: var(--gray-800); }
    .logo-bar p { color: var(--gray-600); font-size: 0.9rem; margin-top: 4px; }
    .card { background: #fff; border-radius: 16px; padding: 36px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
    .field input { width: 100%; border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 11px 14px; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
    .btn { width: 100%; background: var(--blue); color: #fff; font-weight: 700; font-size: 1rem; padding: 13px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn:hover { background: var(--blue-d); }
    .forgot { text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--gray-600); }
    .forgot a { color: var(--blue); text-decoration: none; font-weight: 600; }
    .divider { text-align: center; color: var(--gray-400); font-size: 0.8rem; margin: 20px 0; }
    .demo-btn { width: 100%; background: var(--gray-100); color: var(--gray-800); font-weight: 600; font-size: 0.9rem; padding: 11px; border: 1.5px solid var(--gray-200); border-radius: 8px; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-bottom: 8px; }
    .demo-btn:last-of-type { margin-bottom: 0; }
    .demo-btn:hover { background: var(--gray-200); }
    .demo-btn.mgr { background: #eff6ff; border-color: #bfdbfe; color: var(--blue); }
    .demo-btn.mgr:hover { background: #dbeafe; }
    .demo-label { font-size: 0.72rem; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; margin-top: 2px; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-bar">
    <span class="icon">🏗️</span>
    <h1>Stavební deník</h1>
    <p>Digitální deník pro stavební firmy</p>
  </div>
  <div class="card">
    <div class="field">
      <label>E-mail</label>
      <input type="email" placeholder="jnovak@firma.cz" />
    </div>
    <div class="field">
      <label>Heslo</label>
      <input type="password" placeholder="••••••••" />
    </div>
    <button class="btn" onclick="login()">Přihlásit se</button>
    <div class="divider">nebo vyzkoušejte demo</div>
    <div class="demo-label">Přihlásit jako:</div>
    <button class="demo-btn" onclick="window.location='dashboard.html'">👷 Stavbyvedoucí — Jan Novák</button>
    <button class="demo-btn mgr" onclick="window.location='dashboard-nadrizeny.html'">👔 Nadřízený / Ředitel — Petr Mrázek</button>
    <div class="forgot"><a href="#">Zapomenuté heslo?</a></div>
  </div>
</div>
<script>
  function login() {
    const email = document.querySelector('input[type=email]').value.toLowerCase();
    if (email.includes('mrazek') || email.includes('reditel') || email.includes('nadrizeny')) {
      window.location = 'dashboard-nadrizeny.html';
    } else {
      window.location = 'dashboard.html';
    }
  }
</script>
</body>
</html>
