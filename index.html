<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stavební deník – Přihlášení</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(170deg, #133d18 0%, #1e6b24 35%, #2d8a36 65%, #163d1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Světelný paprsek za logem */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(60,184,67,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
      pointer-events: none;
    }

    /* ---- LOGO SEKCE ---- */
    .hero {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
    }

    .logo-wrap {
      display: inline-block;
      margin-bottom: 24px;
    }

    .logo-wrap img {
      height: 220px;
      width: auto;
      display: block;
      mix-blend-mode: screen;
      filter: grayscale(1) invert(1) brightness(2.2) contrast(2);
    }

    .hero h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .hero p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.02em;
    }

    /* ---- PROFILY ---- */
    .profiles-wrap {
      width: 100%;
      max-width: 700px;
      position: relative;
    }

    .section-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .user-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 10px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.22s ease;
      backdrop-filter: blur(8px);
    }

    .user-btn:hover {
      background: rgba(60,184,67,0.15);
      border-color: rgba(60,184,67,0.5);
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.3), 0 0 20px rgba(60,184,67,0.15);
    }

    .u-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(60,184,67,0.25);
      border: 2px solid rgba(60,184,67,0.5);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }

    .user-btn.admin .u-avatar {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
    }

    .u-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    .u-role {
      font-size: 0.66rem;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
    }

    .user-btn.admin .u-role {
      color: rgba(109,209,116,0.85);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .divider span {
      font-size: 0.62rem;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .version {
      margin-top: 28px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero        { animation: fadeUp 0.55s ease both; }
    .profiles-wrap { animation: fadeUp 0.55s 0.15s ease both; }
    .version     { animation: fadeUp 0.4s 0.3s ease both; }

    .user-btn    { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="logo-wrap">
    <img src="logo.jpg" alt="I. Kamenická stavební a obchodní firma s.r.o." />
  </div>
  <h1>Stavební deník</h1>
  <p>I. Kamenická stavební a obchodní firma s.r.o.</p>
</div>

<!-- PROFILY -->
<div class="profiles-wrap">
  <div class="divider"><span>vedení</span></div>
  <div class="user-grid" id="grid-admin"></div>

  <div class="divider"><span>stavbyvedoucí</span></div>

  <div class="user-grid" id="grid-users"></div>
</div>

<div class="version">Stavební deník · I. Kamenická s.r.o.</div>

<script>
  const USERS = [
    { name: 'Ing. Lukáš Hrbek',   role: 'admin', title: 'Vedoucí pobočky'  },
    { name: 'Jaroslav Dvořáček',  role: 'admin', title: 'Vedoucí / Admin'   },
    { name: 'Tadeáš Zahradník',   role: 'admin', title: 'Vedoucí / Admin'   },
    { name: 'Václav Hanzálek',    role: 'admin', title: 'Vedoucí / Admin'   },
    { name: 'Jan Sláma',          role: 'user',  title: 'Stavbyvedoucí'     },
    { name: 'Roman Fára',         role: 'user',  title: 'Stavbyvedoucí'     },
    { name: 'Antonín Houser',     role: 'user',  title: 'Stavbyvedoucí'     },
    { name: 'Starý Matyáš',       role: 'user',  title: 'Stavbyvedoucí'     },
  ];

  function initials(name) {
    return name.replace(/Ing\.\s*/, '').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function buildGrid() {
    const admins = USERS.filter(u => u.role === 'admin');
    const users  = USERS.filter(u => u.role === 'user');

    document.getElementById('grid-admin').innerHTML = admins.map((u, i) => `
      <button class="user-btn admin" onclick="login('${u.name}', '${u.role}')" style="animation-delay:${0.2 + i * 0.06}s">
        <div class="u-avatar">${initials(u.name)}</div>
        <div class="u-name">${u.name}</div>
        <div class="u-role">${u.title}</div>
      </button>`).join('');

    document.getElementById('grid-users').innerHTML = users.map((u, i) => `
      <button class="user-btn" onclick="login('${u.name}', '${u.role}')" style="animation-delay:${0.35 + i * 0.06}s">
        <div class="u-avatar">${initials(u.name)}</div>
        <div class="u-name">${u.name}</div>
        <div class="u-role">${u.title}</div>
      </button>`).join('');
  }

  function login(name, role) {
    const user = USERS.find(u => u.name === name);
    localStorage.setItem('sd_user', JSON.stringify(user));
    window.location = role === 'admin' ? 'dashboard-nadrizeny.html' : 'dashboard.html';
  }

  buildGrid();
</script>
</body>
</html>
